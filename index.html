<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Case紀錄">
<title>Case 紀錄</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Segoe UI', sans-serif;
    background: #f0f4f2;
    min-height: 100vh;
    color: #1a2a24;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .hdr {
    background: linear-gradient(135deg, #0a5c45 0%, #0F6E56 60%, #1D9E75 100%);
    padding: 52px 20px 18px;
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; }
  .hdr-title { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
  .hdr-sub { font-size: 12px; opacity: .7; margin-top: 3px; }
  .hdr-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Body */
  .body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Card */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .sec-title {
    font-size: 10px;
    font-weight: 700;
    color: #0F6E56;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Fields */
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label { font-size: 13px; color: #5a7066; font-weight: 500; }
  .field input, .field textarea {
    font-family: inherit;
    font-size: 16px;
    padding: 11px 14px;
    border: 1.5px solid #d4e0db;
    border-radius: 10px;
    background: #f8faf9;
    color: #1a2a24;
    width: 100%;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: #1D9E75;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(29,158,117,.12);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Segmented control */
  .seg {
    display: flex;
    border: 1.5px solid #d4e0db;
    border-radius: 10px;
    overflow: hidden;
    background: #f8faf9;
  }
  .seg-btn {
    flex: 1;
    padding: 11px 0;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    background: transparent;
    color: #5a7066;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all .2s;
  }
  .seg-btn.active { background: #0F6E56; color: #fff; }
  .seg-btn:not(:last-child) { border-right: 1.5px solid #d4e0db; }
  .seg-btn.active + .seg-btn { border-left-color: #0F6E56; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 16px;
    border: 1.5px solid #d4e0db;
    border-radius: 22px;
    font-size: 14px;
    cursor: pointer;
    background: #f8faf9;
    color: #5a7066;
    transition: all .15s;
    user-select: none;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.sel { background: #e0f5ed; border-color: #0F6E56; color: #0a5c45; font-weight: 600; }
  .chip.sub { padding: 7px 13px; font-size: 13px; }
  .chip.sub.sel { background: #deeefb; border-color: #185FA5; color: #0c4480; }

  /* Sub section */
  .sub-section {
    background: #f8faf9;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid #e8f0ec;
  }
  .sub-label { font-size: 11px; font-weight: 700; color: #7a9a8e; text-transform: uppercase; letter-spacing: .8px; }

  /* Divider */
  .divider { height: 1px; background: #eef3f0; }

  /* Hidden */
  .hidden { display: none !important; }

  /* Submit button */
  .btn-submit {
    background: linear-gradient(135deg, #0a5c45, #1D9E75);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    width: 100%;
    cursor: pointer;
    letter-spacing: .3px;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 4px 14px rgba(15,110,86,0.3);
  }
  .btn-submit:active { transform: scale(0.98); opacity: .9; }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* Error */
  .err-msg { font-size: 13px; color: #c0392b; text-align: center; min-height: 18px; }

  /* Confirm view */
  .confirm-icon-wrap {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #0a5c45, #1D9E75);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 4px;
    box-shadow: 0 4px 14px rgba(15,110,86,0.3);
  }
  .confirm-icon-wrap svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .confirm-title { font-size: 20px; font-weight: 700; text-align: center; color: #0a5c45; }
  .confirm-sub { font-size: 13px; color: #7a9a8e; text-align: center; margin-top: 4px; }

  /* Summary */
  .summary {
    background: #f8faf9;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border: 1px solid #e8f0ec;
  }
  .s-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .s-label { font-size: 12px; color: #7a9a8e; font-weight: 600; white-space: nowrap; padding-top: 2px; }
  .s-val { font-size: 14px; color: #1a2a24; text-align: right; flex: 1; line-height: 1.5; }
  .chips-val { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }
  .mini-chip {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    background: #e0f5ed; color: #0a5c45; font-weight: 500;
  }
  .s-divider { height: 1px; background: #eef3f0; }

  /* New record button */
  .btn-new {
    background: #fff;
    color: #0F6E56;
    border: 1.5px solid #0F6E56;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    width: 100%;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-new:active { background: #e0f5ed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #0a5c45;
    color: #fff;
    padding: 11px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Case 紀錄</div>
        <div class="hdr-sub">婦產科病例記錄系統</div>
      </div>
      <div class="hdr-badge" id="hdr-count">0 筆</div>
    </div>
  </div>

  <!-- Form View -->
  <div class="body" id="form-view">

    <!-- 基本資料 -->
    <div class="card">
      <div class="sec-title">基本資料</div>
      <div class="row2">
        <div class="field">
          <label>日期</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>院區</label>
          <div class="seg">
            <button class="seg-btn active" onclick="setSeg('clinic','璟馨',this)">璟馨</button>
            <button class="seg-btn" onclick="setSeg('clinic','詠馨',this)">詠馨</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>姓名 *</label>
        <input type="text" id="f-name" placeholder="患者姓名" autocomplete="off">
      </div>
      <div class="row2">
        <div class="field">
          <label>病歷號</label>
          <input type="text" id="f-chart" placeholder="A123456" autocomplete="off">
        </div>
        <div class="field">
          <label>年齡</label>
          <input type="number" id="f-age" placeholder="歲" inputmode="numeric">
        </div>
      </div>
    </div>

    <!-- 類別與處置 -->
    <div class="card">
      <div class="sec-title">類別與處置</div>
      <div class="field">
        <label>科別 *</label>
        <div class="seg">
          <button class="seg-btn active" onclick="setBranch('產科',this)">產科</button>
          <button class="seg-btn" onclick="setBranch('婦科',this)">婦科</button>
        </div>
      </div>

      <!-- 產科 -->
      <div id="branch-obs">
        <div class="divider" style="margin-bottom:4px"></div>
        <div class="field" style="margin-bottom:4px">
          <label>孕週 GA</label>
          <input type="text" id="f-ga" placeholder="e.g. 38+2" autocomplete="off">
        </div>
        <div class="field">
          <label>處置項目 *</label>
          <div class="chips">
            <div class="chip" onclick="toggleChip(this,'自然產 SVD')">自然產 SVD</div>
            <div class="chip" onclick="toggleChip(this,'剖腹產 C/S')">剖腹產 C/S</div>
            <div class="chip" onclick="toggleChip(this,'子宮頸環紮')">子宮頸環紮</div>
            <div class="chip" onclick="toggleChip(this,'D&C')">D&amp;C</div>
            <div class="chip" onclick="toggleChip(this,'羊水穿刺')">羊水穿刺</div>
          </div>
        </div>
        <div class="sub-section hidden" id="svd-sub">
          <div class="sub-label">自然產附加項目</div>
          <div class="chips">
            <div class="chip sub" onclick="toggleChip(this,'引產 Induction')">引產 Induction</div>
            <div class="chip sub" onclick="toggleChip(this,'真空 Vacuum')">真空 Vacuum</div>
          </div>
        </div>
        <div class="sub-section hidden" id="aw-sub">
          <div class="sub-label">羊水穿刺附加項目</div>
          <div class="chips">
            <div class="chip sub" onclick="toggleChip(this,'晶片')">晶片</div>
            <div class="chip sub" onclick="toggleChip(this,'HD晶片')">HD晶片</div>
          </div>
        </div>
      </div>

      <!-- 婦科 -->
      <div class="hidden" id="branch-gyn">
        <div class="divider" style="margin-bottom:4px"></div>
        <div class="field">
          <label>處置項目 *</label>
          <div class="chips">
            <div class="chip" onclick="toggleChip(this,'子宮鏡檢查（門診）')">子宮鏡（門診）</div>
            <div class="chip" onclick="toggleChip(this,'子宮鏡手術（手術室）')">子宮鏡（手術室）</div>
            <div class="chip" onclick="toggleChip(this,'腹腔鏡 LSC')">腹腔鏡 LSC</div>
            <div class="chip" onclick="toggleChip(this,'腹腔鏡 LSM')">腹腔鏡 LSM</div>
            <div class="chip" onclick="toggleChip(this,'腹腔鏡 LSH')">腹腔鏡 LSH</div>
            <div class="chip" onclick="toggleChip(this,'開腹手術 Myomectomy')">開腹 Myomectomy</div>
            <div class="chip" onclick="toggleChip(this,'LEEP / CKC')">LEEP / CKC</div>
            <div class="chip" onclick="toggleChip(this,'TVT / 骨盆腔重建')">TVT / 骨盆腔重建</div>
            <div class="chip" onclick="toggleChip(this,'其他')">其他</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 備注 -->
    <div class="card">
      <div class="sec-title">備注</div>
      <div class="field">
        <textarea id="f-note" rows="3" placeholder="特殊狀況、術中發現、後續追蹤..." style="resize:none"></textarea>
      </div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitForm()">送出記錄</button>
    <div class="err-msg" id="err-msg"></div>
    <div style="height:24px"></div>
  </div>

  <!-- Confirm View -->
  <div class="body hidden" id="confirm-view">
    <div class="card" style="gap:18px; align-items:stretch">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0">
        <div class="confirm-icon-wrap">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="confirm-title">記錄已儲存</div>
        <div class="confirm-sub">資料已寫入 Google Sheets</div>
      </div>
      <div class="summary" id="summary-box"></div>
    </div>
    <button class="btn-new" onclick="newRecord()">＋ 新增下一筆</button>
    <div style="height:24px"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyn3PQ8pxbXebyQq_KrIeUWKB3LS3DqtAdzhdS1usK02pRZRCZVHyCkSylLAKxeE5yRbw/exec';
  var state = { clinic: '璟馨', branch: '產科', chips: [], count: 0 };

  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

  function setSeg(key, val, btn) {
    state[key] = val;
    btn.parentElement.querySelectorAll('.seg-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  function setBranch(b, btn) {
    state.branch = b;
    state.chips = [];
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('sel'); });
    document.getElementById('branch-obs').classList.toggle('hidden', b !== '產科');
    document.getElementById('branch-gyn').classList.toggle('hidden', b !== '婦科');
    document.getElementById('svd-sub').classList.add('hidden');
    document.getElementById('aw-sub').classList.add('hidden');
    btn.parentElement.querySelectorAll('.seg-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  function toggleChip(el, val) {
    el.classList.toggle('sel');
    var idx = state.chips.indexOf(val);
    if (idx === -1) { state.chips.push(val); } else { state.chips.splice(idx, 1); }
    if (state.branch === '產科') {
      var hasSVD = state.chips.indexOf('自然產 SVD') !== -1;
      var hasAW  = state.chips.indexOf('羊水穿刺') !== -1;
      document.getElementById('svd-sub').classList.toggle('hidden', !hasSVD);
      document.getElementById('aw-sub').classList.toggle('hidden', !hasAW);
      if (!hasSVD) clearSub(['引產 Induction', '真空 Vacuum']);
      if (!hasAW)  clearSub(['晶片', 'HD晶片']);
    }
  }

  function clearSub(vals) {
    vals.forEach(function(v) {
      var i = state.chips.indexOf(v);
      if (i !== -1) state.chips.splice(i, 1);
      document.querySelectorAll('.chip.sub').forEach(function(c) {
        if (c.getAttribute('onclick') && c.getAttribute('onclick').indexOf(v) !== -1)
          c.classList.remove('sel');
      });
    });
  }

  function showErr(msg) {
    var el = document.getElementById('err-msg');
    el.textContent = msg;
    setTimeout(function() { el.textContent = ''; }, 3000);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function submitForm() {
    var name = document.getElementById('f-name').value.trim();
    if (!name) { showErr('請填寫患者姓名'); return; }
    if (state.chips.length === 0) { showErr('請選擇至少一項處置項目'); return; }

    var payload = {
      date:   document.getElementById('f-date').value,
      clinic: state.clinic,
      name:   name,
      chart:  document.getElementById('f-chart').value.trim(),
      age:    document.getElementById('f-age').value.trim(),
      branch: state.branch,
      ga:     document.getElementById('f-ga').value.trim(),
      chips:  state.chips.join('、'),
      note:   document.getElementById('f-note').value.trim()
    };

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '送出中...';

    fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(payload) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.result === 'success') {
          state.count++;
          document.getElementById('hdr-count').textContent = state.count + ' 筆';
          buildSummary(payload);
          document.getElementById('form-view').classList.add('hidden');
          document.getElementById('confirm-view').classList.remove('hidden');
        } else {
          showErr('送出失敗，請再試一次');
        }
      })
      .catch(function() {
        showErr('網路錯誤，請檢查連線後再試');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = '送出記錄';
      });
  }

  function buildSummary(p) {
    var rows = [
      { l: '日期', v: p.date },
      { l: '院區', v: p.clinic },
      { l: '姓名', v: p.name },
    ];
    if (p.chart) rows.push({ l: '病歷號', v: p.chart });
    if (p.age)   rows.push({ l: '年齡',   v: p.age + ' 歲' });
    rows.push({ l: '科別', v: p.branch });
    if (p.ga)    rows.push({ l: '孕週 GA', v: p.ga });
    rows.push({ l: '處置', chips: p.chips.split('、') });
    if (p.note)  rows.push({ l: '備注', v: p.note });

    var html = rows.map(function(r, i) {
      var divider = i > 0 ? '<div class="s-divider"></div>' : '';
      if (r.chips) {
        return divider + '<div class="s-row"><span class="s-label">' + r.l + '</span><span class="s-val chips-val">' +
          r.chips.map(function(c) { return '<span class="mini-chip">' + c + '</span>'; }).join('') +
          '</span></div>';
      }
      return divider + '<div class="s-row"><span class="s-label">' + r.l + '</span><span class="s-val">' + r.v + '</span></div>';
    }).join('');
    document.getElementById('summary-box').innerHTML = html;
  }

  function newRecord() {
    ['f-name', 'f-chart', 'f-age', 'f-ga', 'f-note'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
    state.chips = [];
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('sel'); });
    document.getElementById('svd-sub').classList.add('hidden');
    document.getElementById('aw-sub').classList.add('hidden');
    document.getElementById('form-view').classList.remove('hidden');
    document.getElementById('confirm-view').classList.add('hidden');
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
